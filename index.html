<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistika Interaktif: Materi Modus dan Kuartil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes dropLine {
      0% { transform: translateY(-40px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadePop {
      0% { opacity: 0; transform: translateY(-10px) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .drop-anim {
      animation: dropLine 0.65s ease forwards;
    }

    .fade-pop {
      animation: fadePop 0.55s ease forwards;
    }


    @keyframes growDown {
      0% { height: 0; opacity: 0; }
      100% { height: 86%; opacity: 1; }
    }

    @keyframes badgeBounce {
      0% { opacity: 0; transform: translate(-50%, -14px) scale(0.75); }
      60% { opacity: 1; transform: translate(-50%, 4px) scale(1.08); }
      100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }

    @keyframes softPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 10px 22px rgba(15, 23, 42, 0.12); }
      50% { transform: scale(1.08); box-shadow: 0 16px 30px rgba(15, 23, 42, 0.22); }
    }

    @keyframes slideGlow {
      0% { opacity: 0; transform: scaleX(0); }
      100% { opacity: 1; transform: scaleX(1); }
    }

    @keyframes arrowDrop {
      0% { opacity: 0; transform: translate(-50%, -26px); }
      100% { opacity: 1; transform: translate(-50%, 0); }
    }

    .quartile-line {
      animation: growDown 0.8s ease forwards;
      transform-origin: top;
    }

    .quartile-badge {
      animation: badgeBounce 0.7s ease forwards;
    }

    .quartile-pulse {
      animation: softPulse 1.15s ease-in-out infinite;
    }

    .quartile-glow {
      animation: slideGlow 0.7s ease forwards;
      transform-origin: left;
    }

    .quartile-arrow {
      animation: arrowDrop 0.65s ease forwards;
    }
  </style>
</head>

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sortNumbers(data) {
      return [...data].sort((a, b) => a - b);
    }

    function generateModeQ() {
      const start = rand(10, 50);
      const width = 5;
      const data = Array.from({ length: 5 }, (_, i) => ({
        lower: start + i * width,
        upper: start + i * width + 4,
        freq: rand(3, 12),
      }));

      const modalIndex = rand(1, 3);
      const otherMax = Math.max(...data.filter((_, i) => i !== modalIndex).map((item) => item.freq));
      data[modalIndex].freq = otherMax + rand(2, 4);

      return { data, modalIndex };
    }

    function generateQuartileQ() {
      const values = new Set();
      while (values.size < 10) values.add(rand(10, 100));
      return Array.from(values);
    }

    function generateFinalAssessment() {
      return {
        modeQuestion: generateModeQ(),
        quartileQuestion: generateQuartileQ(),
      };
    }

    function getModeDetails(question) {
      const modalClass = question.data[question.modalIndex];
      const lowerBoundary = modalClass.lower - 0.5;
      const classWidth = 5;
      const freqBefore = question.data[question.modalIndex - 1]?.freq ?? modalClass.freq - 1;
      const freqAfter = question.data[question.modalIndex + 1]?.freq ?? modalClass.freq - 1;
      const leftDifference = Math.max(1, modalClass.freq - freqBefore);
      const rightDifference = Math.max(1, modalClass.freq - freqAfter);
      const modeValue = lowerBoundary + (leftDifference / (leftDifference + rightDifference)) * classWidth;

      return {
        modalClass,
        lowerBoundary,
        classWidth,
        freqBefore,
        freqAfter,
        leftDifference,
        rightDifference,
        modeValue,
      };
    }

    function getQuartileDetails(data) {
      const sorted = sortNumbers(data);
      const q2 = (sorted[4] + sorted[5]) / 2;
      const lowerHalf = sorted.slice(0, 5);
      const upperHalf = sorted.slice(5);
      const q1 = lowerHalf[2];
      const q3 = upperHalf[2];
      return { sorted, q1, q2, q3 };
    }

    function playTone(type = 'success') {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        const ctx = new AudioCtx();
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);

        if (type === 'success') {
          oscillator.frequency.setValueAtTime(523.25, ctx.currentTime);
          oscillator.frequency.setValueAtTime(659.25, ctx.currentTime + 0.12);
          gainNode.gain.setValueAtTime(0.001, ctx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.14, ctx.currentTime + 0.02);
          gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
          oscillator.start(ctx.currentTime);
          oscillator.stop(ctx.currentTime + 0.3);
        } else {
          oscillator.type = 'sawtooth';
          oscillator.frequency.setValueAtTime(220, ctx.currentTime);
          oscillator.frequency.setValueAtTime(170, ctx.currentTime + 0.14);
          gainNode.gain.setValueAtTime(0.001, ctx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.02);
          gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
          oscillator.start(ctx.currentTime);
          oscillator.stop(ctx.currentTime + 0.22);
        }
      } catch {}
    }

          </div>
        </div>
      );
    }

    function FrequencyBar({ label, value, active, wrong, onClick }) {

    function ModeFormulaDisplay({ lowerBoundary, leftDifference, rightDifference, classWidth }) {
      return (
        <div className="mt-2 rounded-xl bg-white/15 p-3 text-center font-serif italic leading-relaxed">
          <div className="text-2xl">

      );
    }

    function QuartileFormulaDisplay() {
      return (
        <div className="mt-2 rounded-xl bg-slate-100 p-4 text-center text-slate-800 shadow-inner">
          <div className="text-xl font-serif italic">

            <span className="inline-block align-middle text-center">
              <span className="border-b-2 border-slate-700 px-3">i(n + 1)</span>
              <br />

            </span>
          </div>
          <div className="mt-3 space-y-1 text-sm font-semibold text-slate-700">
            <div>Letak Q1 = 1(n + 1) / 4</div>

      const [data, setData] = useState(generateQuartileQ());
      const [dragIndex, setDragIndex] = useState(null);
      const [step, setStep] = useState(0);
      const [popup, setPopup] = useState({ show: false, type: 'success', text: '' });
      const [completed, setCompleted] = useState(false);
      const [quartileInfo, setQuartileInfo] = useState(null);

      const correctSorted = useMemo(() => sortNumbers(data), [data]);
      const { q1, q2, q3 } = useMemo(() => getQuartileDetails(data), [data]);

      function openPopup(type, text) {
        setPopup({ show: true, type, text });
        window.setTimeout(() => setPopup({ show: false, type, text }), 900);
      }

      function handleDragStart(index) {
        if (completed) return;
        setDragIndex(index);
      }

      function handleDrop(index) {
        if (dragIndex === null || completed) return;
        const newData = [...data];
        [newData[dragIndex], newData[index]] = [newData[index], newData[dragIndex]];
        setData(newData);
        setDragIndex(null);
      }

      function handleTouchEnd(index) {
        if (dragIndex === null || completed || dragIndex === index) return;
        handleDrop(index);
      }

      function checkAnswer() {
        if (JSON.stringify(data) === JSON.stringify(correctSorted)) {
          setCompleted(true);
          setStep(1);
          playTone('success');
          openPopup('success', 'Benar! Data sudah urut');
          window.setTimeout(() => setStep(2), 800);
          window.setTimeout(() => setStep(3), 1500);
          window.setTimeout(() => setStep(4), 2200);
          window.setTimeout(() => setStep(5), 2900);
        } else {
          playTone('error');
          openPopup('error', 'Masih salah. Data harus diurutkan dulu agar kuartil tidak keliru.');
        }

        if (kind === 'q1') setQuartileInfo('Q1 adalah kuartil bawah. Pada simulasi ini Q1 diambil dari nilai tengah bagian bawah data setelah diurutkan. Rumus letaknya dapat dipahami sebagai 1(n + 1) / 4.');

        if (kind === 'q3') setQuartileInfo('Q3 adalah kuartil atas. Pada simulasi ini Q3 diambil dari nilai tengah bagian atas data setelah diurutkan. Rumus letaknya dapat dipahami sebagai 3(n + 1) / 4.');

                {data.map((num, index) => (
                  <div
                    key={`${num}-${index}`}
                    draggable={!completed}
                    onDragStart={() => handleDragStart(index)}
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={() => handleDrop(index)}
                    onTouchStart={() => handleDragStart(index)}
                    onTouchEnd={() => handleTouchEnd(index)}
                    className={`rounded-2xl px-4 py-3 text-lg font-black shadow-lg transition ${
                      completed
                        ? 'bg-gradient-to-r from-emerald-400 to-green-500 text-white'

                  >
                    {num}

              </div>

              {!completed && (
                <button
                  onClick={checkAnswer}

            {step >= 2 && (

                              }`}
                            >
                              {num}
                            </div>
                            <div className="text-[10px] font-bold text-slate-400">data {index + 1}</div>
                          </div>
                        );
                      })}
                    </div>

                    {step >= 2 && (
                      <>
                        <div className="quartile-arrow pointer-events-none absolute left-[28%] top-4 text-2xl">⬇️</div>
                        <div className="quartile-line pointer-events-none absolute left-[28%] top-10 w-1 -translate-x-1/2 rounded-full bg-purple-500" />
                        <div className="quartile-badge pointer-events-none absolute left-[28%] top-0 rounded-full bg-purple-100 px-3 py-1 text-xs font-black text-purple-800 shadow">
                          Q1 = nilai tengah bagian bawah

                      </>

                    {step >= 3 && (

                        <div className="quartile-line pointer-events-none absolute left-[50%] top-10 w-1 -translate-x-1/2 rounded-full bg-blue-500" />
                        <div className="quartile-badge pointer-events-none absolute left-[50%] top-0 rounded-full bg-blue-100 px-3 py-1 text-xs font-black text-blue-800 shadow">
                          Q2 = median

                      </>

                    {step >= 4 && (

                        <div className="quartile-arrow pointer-events-none absolute left-[78%] top-4 text-2xl">⬇️</div>
                        <div className="quartile-line pointer-events-none absolute left-[78%] top-10 w-1 -translate-x-1/2 rounded-full bg-green-500" />
                        <div className="quartile-badge pointer-events-none absolute left-[78%] top-0 rounded-full bg-green-100 px-3 py-1 text-xs font-black text-green-800 shadow">
                          Q3 = nilai tengah bagian atas
                        </div>
                      </>
                    )}
                  </div>

                  <div className="mt-4 grid gap-3 md:grid-cols-3">
                    {step >= 2 ? (
                      <button onClick={() => showQuartileInfo('q1')} className="rounded-2xl bg-purple-200 p-3 text-sm font-bold text-purple-900 shadow transition hover:scale-[1.02]">Q1 = {q1}</button>
                    ) : (
                      <div className="rounded-2xl bg-slate-200 p-3 text-sm font-bold text-slate-500 shadow">Q1 = ?</div>
                    )}
                    {step >= 3 ? (
                      <button onClick={() => showQuartileInfo('q2')} className="rounded-2xl bg-blue-200 p-3 text-sm font-bold text-blue-900 shadow transition hover:scale-[1.02]">Q2 = {q2}</button>
                    ) : (
                      <div className="rounded-2xl bg-slate-200 p-3 text-sm font-bold text-slate-500 shadow">Q2 = ?</div>
                    )}
                    {step >= 4 ? (
                      <button onClick={() => showQuartileInfo('q3')} className="rounded-2xl bg-green-200 p-3 text-sm font-bold text-green-900 shadow transition hover:scale-[1.02]">Q3 = {q3}</button>
                    ) : (
                      <div className="rounded-2xl bg-slate-200 p-3 text-sm font-bold text-slate-500 shadow">Q3 = ?</div>
                    )}
                  </div>

                  {quartileInfo && <div className="mt-4 rounded-xl bg-indigo-50 p-4 text-sm text-slate-700 shadow">{quartileInfo}</div>}
                </div>

                {step >= 5 && (
                  <div className="rounded-2xl bg-white p-4 shadow">
                    <p className="font-bold text-slate-800">Apa yang terjadi?</p>
                    <p className="mt-2 text-sm leading-6 text-slate-700">
                      Setelah data diurutkan, Q1 menunjukkan tengah bagian bawah, Q2 menunjukkan tengah seluruh data, dan Q3 menunjukkan tengah bagian atas. Animasi garis membantu siswa melihat posisi kuartil, bukan hanya menghafal rumus.
                    </p>
                    <QuartileFormulaDisplay />

            )}
          </Card>
        </>
      );

    function TantanganQuiz({ onBack }) {
      const [assessment] = useState(generateFinalAssessment());
      const [modeAnswerInput, setModeAnswerInput] = useState('');
      const [q1Input, setQ1Input] = useState('');
      const [q2Input, setQ2Input] = useState('');
      const [q3Input, setQ3Input] = useState('');
      const [checked, setChecked] = useState(false);
      const [passed, setPassed] = useState(null);
      const [score, setScore] = useState(0);
      const [result, setResult] = useState(null);

      const assessmentModeDetails = useMemo(() => getModeDetails(assessment.modeQuestion), [assessment]);
      const assessmentQuartileDetails = useMemo(() => getQuartileDetails(assessment.quartileQuestion), [assessment]);

      function inputStyle(isCorrect) {
        if (!checked) return 'border-slate-300 bg-white';
        return isCorrect ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50';
      }

      function ResultBadge({ ok }) {
        if (!checked) return null;
        return ok ? (
          <span className="rounded-full bg-green-100 px-3 py-1 text-xs font-black text-green-700">✓ Benar</span>
        ) : (
          <span className="rounded-full bg-red-100 px-3 py-1 text-xs font-black text-red-700">✗ Salah</span>
        );
      }

      function AnswerFeedback({ label, userAnswer, correctAnswer, ok }) {
        if (!checked) return null;
        return (
          <div className={`mt-2 rounded-xl p-3 text-sm ${ok ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}`}>
            <div className="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
              <p className="font-bold">{label}: {ok ? 'jawabanmu benar' : 'jawabanmu salah'}</p>
              <ResultBadge ok={ok} />
            </div>
            <p className="mt-1">Jawaban siswa: <b>{userAnswer === '' ? 'kosong' : userAnswer}</b></p>
            {!ok && <p>Jawaban yang benar: <b>{correctAnswer}</b></p>}
          </div>
        );
      }

      function checkQuiz() {
        const expectedMode = Number(assessmentModeDetails.modeValue.toFixed(1));
        const modeOk = Math.abs(Number(modeAnswerInput) - expectedMode) < 0.2;
        const q1Ok = Number(q1Input) === assessmentQuartileDetails.q1;
        const q2Ok = Number(q2Input) === assessmentQuartileDetails.q2;
        const q3Ok = Number(q3Input) === assessmentQuartileDetails.q3;

        const totalScore = [modeOk, q1Ok, q2Ok, q3Ok].filter(Boolean).length * 25;
        setScore(totalScore);
        setChecked(true);
        setPassed(modeOk && q1Ok && q2Ok && q3Ok);
        setResult({
          modeOk,
          q1Ok,
          q2Ok,
          q3Ok,
          expectedMode,
          q1: assessmentQuartileDetails.q1,
          q2: assessmentQuartileDetails.q2,
          q3: assessmentQuartileDetails.q3,
          sorted: assessmentQuartileDetails.sorted,
        });
      }

      return (
        <div className="rounded-[2rem] bg-white/80 p-6 shadow-xl">
          <div className="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
            <div>
              <h2 className="text-2xl font-black text-slate-800">Tantangan</h2>
              <p className="mt-2 text-sm text-slate-700">Kerjakan soal baru dari dua materi berikut.</p>
            </div>
            <div className="rounded-3xl bg-gradient-to-r from-yellow-300 to-orange-400 px-5 py-4 text-center shadow-lg">
              <div className="text-xs font-black uppercase tracking-wide text-slate-700">Skor</div>
              <div className="text-4xl font-black text-white drop-shadow">{score}</div>
              <div className="text-xs font-bold text-white">/ 100</div>
            </div>
          </div>

          <div className="mt-5 space-y-5">
            <div className={`rounded-2xl p-4 shadow ${checked && result?.modeOk ? 'bg-green-50 ring-2 ring-green-300' : checked ? 'bg-red-50 ring-2 ring-red-300' : 'bg-white'}`}>
              <div className="flex items-center justify-between gap-2">
                <p className="font-bold text-slate-800">Soal 1: Modus data berkelompok</p>
                {checked && <ResultBadge ok={result?.modeOk} />}
              </div>
              <div className="mt-3 overflow-hidden rounded-2xl border border-slate-200">
                <table className="min-w-full text-left text-sm">
                  <thead className="bg-slate-50 text-slate-700">
                    <tr>
                      <th className="px-4 py-3 font-semibold">Kelas</th>
                      <th className="px-4 py-3 font-semibold">Frekuensi</th>
                    </tr>
                  </thead>
                  <tbody>
                    {assessment.modeQuestion.data.map((row, index) => (
                      <tr key={index} className={`border-t border-slate-200 ${checked && index === assessment.modeQuestion.modalIndex ? 'bg-yellow-100 font-bold' : 'bg-white'}`}>
                        <td className="px-4 py-3">{row.lower}–{row.upper}</td>
                        <td className="px-4 py-3 font-semibold">{row.freq}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="mt-3">
                <label className="mb-1 block text-sm font-bold text-slate-700">Nilai modus</label>
                <input
                  value={modeAnswerInput}
                  onChange={(e) => setModeAnswerInput(e.target.value)}
                  className={`w-full rounded-xl border px-3 py-2 ${inputStyle(result?.modeOk)}`}
                  placeholder="Masukkan nilai modus"
                />
              </div>
              {checked && result && (
                <>
                  <AnswerFeedback label="Modus" userAnswer={modeAnswerInput} correctAnswer={result.expectedMode.toFixed(1)} ok={result.modeOk} />
                  {!result.modeOk && (
                    <div className="mt-3 rounded-xl bg-white p-3 text-sm text-slate-700 shadow-inner">
                      <p className="font-bold text-slate-800">Cara jawaban benar:</p>
                      <p>Kelas modus adalah <b>{assessmentModeDetails.modalClass.lower}–{assessmentModeDetails.modalClass.upper}</b> karena frekuensinya paling besar.</p>
                      <p>Tepi bawah = <b>{assessmentModeDetails.lowerBoundary}</b>, selisih kiri = <b>{assessmentModeDetails.leftDifference}</b>, selisih kanan = <b>{assessmentModeDetails.rightDifference}</b>, panjang kelas = <b>{assessmentModeDetails.classWidth}</b>.</p>
                      <p>Nilai modus yang benar adalah <b>{result.expectedMode.toFixed(1)}</b>.</p>
                    </div>
                  )}
                </>
              )}
            </div>

            <div className="rounded-2xl bg-white p-4 shadow">
              <p className="font-bold text-slate-800">Soal 2: Kuartil data tunggal</p>
              <p className="mt-1 text-sm text-slate-700">Urutkan data berikut secara mental atau di kertas, lalu tentukan Q1, Q2, dan Q3.</p>
              <div className="mt-3 rounded-2xl bg-slate-50 p-3 text-sm text-slate-800">
                {assessment.quartileQuestion.join(', ')}
              </div>
              {checked && result && (
                <div className="mt-3 rounded-2xl bg-blue-50 p-3 text-sm text-blue-800">
                  <p className="font-bold">Data yang sudah diurutkan:</p>
                  <p>{result.sorted.join(', ')}</p>
                </div>
              )}
              <div className="mt-4 grid gap-3 md:grid-cols-3">
                <div className={`rounded-2xl p-3 ${checked && result?.q1Ok ? 'bg-green-50 ring-2 ring-green-300' : checked ? 'bg-red-50 ring-2 ring-red-300' : 'bg-slate-50'}`}>
                  <div className="mb-1 flex items-center justify-between gap-2">
                    <label className="block text-sm font-bold text-slate-700">Nilai Q1</label>
                    {checked && <ResultBadge ok={result?.q1Ok} />}
                  </div>
                  <input
                    value={q1Input}
                    onChange={(e) => setQ1Input(e.target.value)}
                    className={`w-full rounded-xl border px-3 py-2 ${inputStyle(result?.q1Ok)}`}
                    placeholder="Masukkan Q1"
                  />
                  {checked && result && <AnswerFeedback label="Q1" userAnswer={q1Input} correctAnswer={result.q1} ok={result.q1Ok} />}
                </div>
                <div className={`rounded-2xl p-3 ${checked && result?.q2Ok ? 'bg-green-50 ring-2 ring-green-300' : checked ? 'bg-red-50 ring-2 ring-red-300' : 'bg-slate-50'}`}>
                  <div className="mb-1 flex items-center justify-between gap-2">
                    <label className="block text-sm font-bold text-slate-700">Nilai Q2</label>
                    {checked && <ResultBadge ok={result?.q2Ok} />}
                  </div>
                  <input
                    value={q2Input}
                    onChange={(e) => setQ2Input(e.target.value)}
                    className={`w-full rounded-xl border px-3 py-2 ${inputStyle(result?.q2Ok)}`}
                    placeholder="Masukkan Q2"
                  />
                  {checked && result && <AnswerFeedback label="Q2" userAnswer={q2Input} correctAnswer={result.q2} ok={result.q2Ok} />}
                </div>
                <div className={`rounded-2xl p-3 ${checked && result?.q3Ok ? 'bg-green-50 ring-2 ring-green-300' : checked ? 'bg-red-50 ring-2 ring-red-300' : 'bg-slate-50'}`}>
                  <div className="mb-1 flex items-center justify-between gap-2">
                    <label className="block text-sm font-bold text-slate-700">Nilai Q3</label>
                    {checked && <ResultBadge ok={result?.q3Ok} />}
                  </div>
                  <input
                    value={q3Input}
                    onChange={(e) => setQ3Input(e.target.value)}
                    className={`w-full rounded-xl border px-3 py-2 ${inputStyle(result?.q3Ok)}`}
                    placeholder="Masukkan Q3"
                  />
                  {checked && result && <AnswerFeedback label="Q3" userAnswer={q3Input} correctAnswer={result.q3} ok={result.q3Ok} />}
                </div>
              </div>
            </div>
          </div>

          <button
            onClick={checkQuiz}
            className="mt-4 w-full rounded-2xl bg-gradient-to-r from-amber-500 to-orange-500 px-4 py-3 font-bold text-white shadow-lg transition hover:scale-[1.02]"
          >
            Cek Hasil Tantangan
          </button>

          {checked && passed === true && (
            <div className="mt-3 rounded-xl bg-green-100 p-3 text-green-700">
              <p className="font-bold">Benar semua! Skormu {score}/100.</p>
              <p className="mt-1 text-sm">Semua jawaban sudah tepat.</p>
            </div>
          )}

          {checked && passed === false && result && (
            <div className="mt-3 rounded-xl bg-red-100 p-3 text-red-700">
              <p className="font-bold">Skormu {score}/100. Bagian yang salah sudah diberi warna merah.</p>
              <p className="mt-1 text-sm">Jawaban yang benar langsung ditampilkan di bawah jawaban siswa agar siswa bisa memperbaiki pemahamannya.</p>
            </div>
          )}

          <button onClick={onBack} className="mt-5 rounded-xl bg-slate-700 px-4 py-2 text-white">
            Kembali
          </button>
        </div>
      );
    }

    function MenuScreen({ onStart, onMateri, onQuiz }) {
      return (
        <div className="relative overflow-hidden rounded-[2.5rem] border-4 border-white/70 bg-gradient-to-br from-sky-100 via-pink-50 to-yellow-100 p-8 shadow-2xl">
          <div className="absolute -left-8 top-10 h-28 w-28 rounded-full bg-pink-300/60 blur-2xl" />
          <div className="absolute right-6 top-8 h-24 w-24 rounded-full bg-yellow-300/70 blur-2xl" />
          <div className="absolute bottom-8 left-16 h-20 w-20 rounded-full bg-sky-300/60 blur-2xl" />
          <div className="absolute bottom-10 right-16 h-24 w-24 rounded-full bg-green-300/50 blur-2xl" />

          <div className="absolute left-6 top-6 rotate-[-8deg] rounded-2xl bg-white/80 px-4 py-2 text-2xl shadow">📊</div>
          <div className="absolute right-8 top-24 rotate-[10deg] rounded-2xl bg-white/80 px-4 py-2 text-2xl shadow">🎯</div>
          <div className="absolute bottom-24 left-10 rotate-[8deg] rounded-2xl bg-white/80 px-4 py-2 text-2xl shadow">📘</div>
          <div className="absolute bottom-10 right-10 rotate-[-10deg] rounded-2xl bg-white/80 px-4 py-2 text-2xl shadow">🏆</div>

          <div className="relative text-center">
            <div className="mb-4 flex items-center justify-center gap-3">
              <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-white p-1.5 shadow-lg ring-2 ring-white/80 md:h-16 md:w-16">
                <img src={LOGO_UNMUL} alt="Logo Universitas Mulawarman" className="h-full w-full object-contain" />
              </div>
              <div className="rounded-full bg-white/90 px-3 py-1.5 text-xs font-black text-slate-700 shadow md:text-sm">
                Media Pembelajaran<br />Statistika
              </div>
              <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-white p-1.5 shadow-lg ring-2 ring-white/80 md:h-16 md:w-16">
                <img src={LOGO_HIMAPTIKA} alt="Logo HIMAPTIKA" className="h-full w-full object-contain" />
              </div>
            </div>
            <div className="mx-auto inline-flex rounded-full bg-gradient-to-r from-yellow-200 via-pink-200 to-sky-200 px-6 py-3 shadow-lg">
              <h1 className="text-3xl font-black tracking-wide text-slate-800 md:text-5xl">STATISTIKA INTERAKTIF: MATERI MODUS DAN KUARTIL</h1>
            </div>

            <p className="mt-4 text-lg font-bold text-slate-700 md:text-2xl">Pahami Data, Bukan Hafal Rumus!</p>
            <p className="mx-auto mt-3 max-w-2xl text-sm text-slate-600 md:text-base">
              Belajar modus dan kuartil dengan visual, animasi, dan tantangan yang lebih seru.
            </p>

            <div className="mt-5 flex flex-wrap items-center justify-center gap-3 text-sm font-bold text-slate-700">
              <span className="rounded-full bg-white px-4 py-2 shadow">🎮 Game interaktif</span>
              <span className="rounded-full bg-white px-4 py-2 shadow">📘 Materi singkat</span>
              <span className="rounded-full bg-white px-4 py-2 shadow">🎯 Tantangan soal</span>
            </div>
          </div>

          <div className="relative mt-8 grid gap-5 md:grid-cols-2">
            <button
              onClick={onStart}
              className="rounded-[2rem] border-4 border-green-200 bg-gradient-to-br from-green-300 to-lime-300 px-6 py-6 text-left text-slate-800 shadow-xl transition hover:-translate-y-1 hover:scale-[1.02]"
            >
              <div className="flex items-center gap-4">
                <div className="flex h-16 w-16 items-center justify-center rounded-2xl bg-white text-3xl shadow-lg">▶</div>
                <div>
                  <div className="text-2xl font-black">Mulai Game Pembelajaran</div>
                  <div className="mt-1 text-sm font-semibold text-slate-700">Masuk ke misi modus dan kuartil</div>
                </div>
              </div>
            </button>

            <button
              onClick={onMateri}
              className="rounded-[2rem] border-4 border-sky-200 bg-gradient-to-br from-sky-300 to-blue-300 px-6 py-6 text-left text-slate-800 shadow-xl transition hover:-translate-y-1 hover:scale-[1.02]"
            >
              <div className="flex items-center gap-4">
                <div className="flex h-16 w-16 items-center justify-center rounded-2xl bg-white text-3xl shadow-lg">📘</div>
                <div>
                  <div className="text-2xl font-black">Materi Singkat</div>
                  <div className="mt-1 text-sm font-semibold text-slate-700">Baca definisi, rumus, dan arti istilah</div>
                </div>
              </div>
            </button>

            <button
              onClick={onQuiz}
              className="rounded-[2rem] border-4 border-orange-200 bg-gradient-to-br from-orange-300 to-amber-300 px-6 py-6 text-left text-slate-800 shadow-xl transition hover:-translate-y-1 hover:scale-[1.02] md:col-span-2"
            >
              <div className="flex items-center gap-4">
                <div className="flex h-16 w-16 items-center justify-center rounded-2xl bg-white text-3xl shadow-lg">🎯</div>
                <div>
                  <div className="text-2xl font-black">Tantangan</div>
                  <div className="mt-1 text-sm font-semibold text-slate-700">Kerjakan soal baru untuk menguji pemahamanmu</div>
                </div>
              </div>
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState('menu');
      const [level, setLevel] = useState(1);

      return (
        <div className="min-h-screen bg-gradient-to-r from-purple-200 via-pink-200 to-yellow-200 p-6">
          <div className="mx-auto max-w-6xl">
            {screen === 'menu' && (
              <MenuScreen
                onStart={() => {
                  setLevel(1);
                  setScreen('game');
                }}
                onMateri={() => setScreen('materi')}
                onQuiz={() => setScreen('quiz')}
              />
            )}

            {screen === 'materi' && <MateriSingkat onBack={() => setScreen('menu')} />}

            {screen === 'game' && (
              <>
                {level === 1 && <ModeGame goNext={() => setLevel(2)} />}
                {level === 2 && <QuartileGame />}
                <button onClick={() => setScreen('menu')} className="mt-5 rounded-xl bg-slate-700 px-4 py-2 text-white">
                  Kembali ke Menu
                </button>
              </>
            )}

            {screen === 'quiz' && <TantanganQuiz onBack={() => setScreen('menu')} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
