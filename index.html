<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Statistika Interaktif</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .floaty {
      animation: floaty 3s ease-in-out infinite;
    }

    @keyframes floaty {
      0%,100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-10px) rotate(3deg);
      }
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-r from-purple-200 via-pink-200 to-yellow-200 p-5">

<div id="app" class="mx-auto max-w-6xl"></div>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/PASTE_URL_KAMU/exec";

const state = {

  level: 1,

  modeQuestion: null,

  quartileData: [],

  selectedIndex: null,

  score: Number(
    localStorage.getItem("score")
  ) || 0,

  nama: "",

  kelas: "",

  timer: 0,

  timerInterval: null
};

function saveScore() {
  localStorage.setItem("score", state.score);
}

function startTimer() {

  clearInterval(state.timerInterval);

  state.timer = 0;

  state.timerInterval = setInterval(() => {

    state.timer++;

    const el =
      document.getElementById("timerText");

    if (el) {

      const minutes =
        Math.floor(state.timer / 60);

      const seconds =
        state.timer % 60;

      el.innerText =
        `${minutes}:${seconds
          .toString()
          .padStart(2, "0")}`;
    }

  }, 1000);
}

function stopTimer() {
  clearInterval(state.timerInterval);
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function sortNumbers(arr) {
  return [...arr].sort((a, b) => a - b);
}

function median(arr) {

  const mid = Math.floor(arr.length / 2);

  if (arr.length % 2 === 0) {
    return (arr[mid - 1] + arr[mid]) / 2;
  }

  return arr[mid];
}

function generateModeQ() {

  const start = rand(10, 50);

  const width = 5;

  const data = Array.from({ length: 5 }, (_, i) => ({
    lower: start + i * width,
    upper: start + i * width + 4,
    freq: rand(3, 12)
  }));

  const modalIndex = rand(1, 3);

  const otherMax = Math.max(
    ...data.filter((_, i) => i !== modalIndex).map(x => x.freq)
  );

  data[modalIndex].freq = otherMax + rand(2, 4);

  return { data, modalIndex };
}

function generateQuartileQ() {

  const values = new Set();

  while (values.size < 10) {
    values.add(rand(10, 100));
  }

  return Array.from(values);
}

function getModeDetails(q) {

  const modalClass = q.data[q.modalIndex];

  const lowerBoundary = modalClass.lower - 0.5;

  const classWidth = 5;

  const freqBefore =
    q.data[q.modalIndex - 1]?.freq ??
    modalClass.freq - 1;

  const freqAfter =
    q.data[q.modalIndex + 1]?.freq ??
    modalClass.freq - 1;

  const leftDifference =
    Math.max(1, modalClass.freq - freqBefore);

  const rightDifference =
    Math.max(1, modalClass.freq - freqAfter);

  const modeValue =
    lowerBoundary +
    (leftDifference / (leftDifference + rightDifference)) *
    classWidth;

  return {
    modalClass,
    lowerBoundary,
    classWidth,
    freqBefore,
    freqAfter,
    leftDifference,
    rightDifference,
    modeValue
  };
}

function getQuartileDetails(data) {

  const sorted = sortNumbers(data);

  const q2 = median(sorted);

  const mid = Math.floor(sorted.length / 2);

  const lower =
    sorted.slice(0, mid);

  const upper =
    sorted.slice(mid);

  const q1 = median(lower);

  const q3 = median(upper);

  return { sorted, q1, q2, q3 };
}

function playTone(type = "success") {

  try {

    const AudioCtx =
      window.AudioContext ||
      window.webkitAudioContext;

    const ctx = new AudioCtx();

    const osc = ctx.createOscillator();

    const gain = ctx.createGain();

    osc.connect(gain);

    gain.connect(ctx.destination);

    if (type === "success") {

      osc.type = "triangle";

      osc.frequency.setValueAtTime(
        523,
        ctx.currentTime
      );

      osc.frequency.setValueAtTime(
        659,
        ctx.currentTime + 0.1
      );

      osc.frequency.setValueAtTime(
        784,
        ctx.currentTime + 0.2
      );

    } else {

      osc.type = "sawtooth";

      osc.frequency.setValueAtTime(
        250,
        ctx.currentTime
      );

      osc.frequency.setValueAtTime(
        150,
        ctx.currentTime + 0.2
      );
    }

    gain.gain.setValueAtTime(
      0.1,
      ctx.currentTime
    );

    gain.gain.exponentialRampToValueAtTime(
      0.001,
      ctx.currentTime + 0.4
    );

    osc.start();

    osc.stop(ctx.currentTime + 0.4);

  } catch {}
}

function popup(text, type = "success") {

  const div = document.createElement("div");

  div.className =
    `fixed top-8 left-1/2 -translate-x-1/2 z-50 rounded-2xl px-6 py-4 text-white font-bold shadow-2xl ${
      type === "success"
        ? "bg-gradient-to-r from-green-400 to-emerald-500"
        : "bg-gradient-to-r from-rose-400 to-red-500"
    }`;

  div.textContent = text;

  document.body.appendChild(div);

  setTimeout(() => div.remove(), 2000);
}

function formulaModusHTML(d = null) {

  return `
    <div class="mt-2 rounded-xl bg-white/15 p-3 text-center font-serif italic leading-relaxed">

      <div class="text-2xl">
        Mo = b +
        <span class="inline-block align-middle text-center">
          <span class="border-b-2 border-current px-2">b₁</span><br>
          <span class="px-2">b₁ + b₂</span>
        </span>
        p
      </div>

      ${
        d
          ? `
          <div class="mt-3 text-base font-sans not-italic">
            Mo = ${d.lowerBoundary} +
            <span class="inline-block align-middle text-center">
              <span class="border-b-2 border-current px-2">${d.leftDifference}</span><br>
              <span class="px-2">${d.leftDifference} + ${d.rightDifference}</span>
            </span>
            × ${d.classWidth}
          </div>
        `
          : ""
      }

    </div>
  `;
}

function showMenu() {

  document.getElementById("app").innerHTML = `

  <div class="rounded-[2rem] bg-white/80 p-8 shadow-xl">

    <h1 class="text-4xl font-black text-center text-slate-800">
      📊 STATISTIKA INTERAKTIF
    </h1>

    <div class="mt-6 rounded-3xl bg-white/80 p-5 shadow">

      <h3 class="text-xl font-black text-slate-800">
        Identitas Siswa
      </h3>

      <div class="mt-4 grid gap-3 md:grid-cols-2">

        <input
          id="namaInput"
          placeholder="Nama siswa"
          class="rounded-2xl border border-slate-300 px-4 py-3">

        <input
          id="kelasInput"
          placeholder="Kelas"
          class="rounded-2xl border border-slate-300 px-4 py-3">

      </div>

    </div>

    <div class="mt-6 text-center">

      <div class="text-lg font-bold text-slate-700">
        Total Score
      </div>

      <div class="text-5xl font-black text-emerald-600">
        ${state.score}
      </div>

    </div>

    <div class="mt-8 grid gap-5">

      <button
        onclick="startGame()"
        class="rounded-3xl bg-gradient-to-r from-green-400 to-emerald-500 px-6 py-5 text-2xl font-black text-white shadow-lg">

        ▶ Mulai Game

      </button>

    </div>

  </div>
  `;
}

function startGame() {

  state.nama =
    document.getElementById("namaInput").value;

  state.kelas =
    document.getElementById("kelasInput").value;

  if (!state.nama || !state.kelas) {

    popup(
      "Isi nama dan kelas dulu",
      "error"
    );

    return;
  }

  startTimer();

  state.level = 1;

  state.modeQuestion = generateModeQ();

  renderModeGame(0, null);
}

function renderModeGame(step, pickedIndex) {

  const q = state.modeQuestion;

  const d = getModeDetails(q);

  const bars = q.data.map((row, index) => `

    <button
      onclick="chooseModeClass(${index}, ${step})"
      class="w-full rounded-2xl border-2 p-3 text-left transition duration-300 ${
        step >= 1 && index === q.modalIndex
          ? "scale-[1.02] border-green-500 bg-green-100"
          : pickedIndex === index && index !== q.modalIndex
          ? "border-red-400 bg-red-100"
          : "border-white/70 bg-white/90 hover:-translate-y-1 hover:bg-sky-50"
      }">

      <div class="mb-2 flex items-center justify-between text-sm font-bold text-slate-700">

        <span>${row.lower}–${row.upper}</span>

        <span>${row.freq}</span>

      </div>

      <div class="h-5 rounded-full bg-slate-200">

        <div
          class="h-5 rounded-full transition-all duration-500 ${
            step >= 1 && index === q.modalIndex
              ? "bg-gradient-to-r from-green-400 to-emerald-500"
              : "bg-gradient-to-r from-pink-400 to-orange-400"
          }"
          style="width:${Math.max(12, row.freq * 6)}%"></div>

      </div>

    </button>

  `).join("");

  document.getElementById("app").innerHTML = `
  
  <div class="rounded-[2rem] bg-white/80 p-6 shadow-xl">

    <div class="flex items-center justify-between">

      <h2 class="text-2xl font-black text-slate-800">
        🎮 Level 1: Modus
      </h2>

      <div class="rounded-2xl bg-white px-4 py-3 text-sm font-bold text-slate-700 shadow">

        <div>
          Score: ${state.score}
        </div>

        <div id="timerText">
          0:00
        </div>

      </div>

    </div>

    <div class="mt-5 space-y-3">
      ${bars}
    </div>

    ${
      step >= 1
        ? `
          <div class="mt-5 rounded-2xl bg-gradient-to-r from-indigo-500 via-violet-500 to-pink-500 p-4 text-white shadow-lg">

            ${formulaModusHTML(d)}

            ${
              step === 1
                ? `
                  <button
                    onclick="renderModeGame(2, null)"
                    class="mt-4 w-full rounded-2xl bg-white px-4 py-3 font-bold text-slate-800 shadow-lg">

                    Lanjut Hitung Modus

                  </button>
                `
                : `
                  <div class="mt-4 grid gap-3 sm:grid-cols-3">

                    ${[
                      Number(d.modeValue.toFixed(1)),
                      Number((d.modeValue + 1.8).toFixed(1)),
                      Number((d.modeValue - 1.7).toFixed(1))
                    ]
                      .sort(() => Math.random() - 0.5)
                      .map(v => `
                        <button
                          onclick="chooseModeValue(${v})"
                          class="rounded-2xl bg-white px-4 py-4 text-lg font-black text-slate-800 shadow-lg">

                          ${v}

                        </button>
                      `)
                      .join("")}

                  </div>
                `
            }

          </div>
        `
        : ""
    }

  </div>
  `;
}

function chooseModeClass(index, step) {

  if (step !== 0) return;

  if (index === state.modeQuestion.modalIndex) {

    state.score += 10;

    saveScore();

    playTone("success");

    popup(
      "Benar! Kamu menemukan kelas modus"
    );

    setTimeout(() => renderModeGame(1, index), 700);

  } else {

    playTone("error");

    popup(
      "Salah. Cari batang dengan frekuensi terbesar",
      "error"
    );

    renderModeGame(0, index);
  }
}

function chooseModeValue(value) {

  const d = getModeDetails(state.modeQuestion);

  if (
    Math.abs(
      value - Number(d.modeValue.toFixed(1))
    ) < 0.5
  ) {

    state.score += 15;

    saveScore();

    playTone("success");

    popup(
      "Hebat! Nilai modus benar"
    );

    setTimeout(() => renderQuartileGame(), 1200);

  } else {

    playTone("error");

    popup(
      "Salah. Periksa lagi tepi bawah, selisih kiri, dan selisih kanan",
      "error"
    );
  }
}

function renderQuartileGame() {

  state.quartileData = generateQuartileQ();

  state.selectedIndex = null;

  renderQuartile(false);
}

function renderQuartile(completed = false) {

  const q = getQuartileDetails(state.quartileData);

  document.getElementById("app").innerHTML = `

  <div class="rounded-[2rem] bg-white/80 p-6 shadow-xl">

    <div class="flex items-center justify-between">

      <h2 class="text-2xl font-black text-slate-800">
        🎯 Level 2: Kuartil
      </h2>

      <div class="rounded-2xl bg-white px-4 py-3 text-sm font-bold text-slate-700 shadow">

        <div>
          Score: ${state.score}
        </div>

        <div id="timerText">
          0:00
        </div>

      </div>

    </div>

    <div class="mt-5 flex flex-wrap gap-3">

      ${state.quartileData.map((num, index) => `

        <div
          ${!completed ? `onclick="selectQuartileCard(${index})"` : ""}
          class="${
            completed
              ? "rounded-2xl px-4 py-3 text-lg font-black shadow-lg bg-gradient-to-r from-emerald-400 to-green-500 text-white"
              : state.selectedIndex === index
              ? "cursor-pointer scale-110 rounded-2xl px-4 py-3 text-lg font-black shadow-lg bg-yellow-300 text-slate-800"
              : "cursor-pointer rounded-2xl px-4 py-3 text-lg font-black shadow-lg bg-gradient-to-r from-fuchsia-400 to-pink-400 text-white hover:-translate-y-1"
          }">

          ${num}

        </div>

      `).join("")}

    </div>

    ${
      !completed
        ? `
          <button
            onclick="checkQuartile()"
            class="mt-5 w-full rounded-2xl bg-gradient-to-r from-green-500 to-emerald-500 px-4 py-3 font-bold text-white shadow-lg">

            Cek Jawaban

          </button>
        `
        : `
          <div class="mt-5 rounded-2xl bg-green-100 p-5 text-green-800 shadow">

            <p class="font-bold">
              Bagus! Data sudah urut.
            </p>

            <div class="mt-4 grid gap-3 md:grid-cols-3">

              <div class="rounded-2xl bg-purple-200 p-3 text-center font-bold">
                Q1 = ${q.q1}
              </div>

              <div class="rounded-2xl bg-blue-200 p-3 text-center font-bold">
                Q2 = ${q.q2}
              </div>

              <div class="rounded-2xl bg-green-200 p-3 text-center font-bold">
                Q3 = ${q.q3}
              </div>

            </div>

          </div>
        `
    }

  </div>
  `;
}

function selectQuartileCard(index) {

  if (state.selectedIndex === null) {

    state.selectedIndex = index;

    popup("Pilih kartu kedua");

    renderQuartile(false);

    return;
  }

  if (state.selectedIndex === index) {

    state.selectedIndex = null;

    renderQuartile(false);

    return;
  }

  const first = state.selectedIndex;

  const second = index;

  [
    state.quartileData[first],
    state.quartileData[second]
  ] = [
    state.quartileData[second],
    state.quartileData[first]
  ];

  state.selectedIndex = null;

  renderQuartile(false);
}

function checkQuartile() {

  const correct =
    sortNumbers(state.quartileData);

  if (
    JSON.stringify(state.quartileData) ===
    JSON.stringify(correct)
  ) {

    state.score += 20;

    saveScore();

    playTone("success");

    popup(
      "Benar! Data sudah urut"
    );

    renderQuartile(true);

    setTimeout(() => {

      showFinalResult();

    }, 2500);

  } else {

    playTone("error");

    popup(
      "Data belum urut dari kecil ke besar",
      "error"
    );
  }
}

function showFinalResult() {

  stopTimer();

  const minutes =
    Math.floor(state.timer / 60);

  const seconds =
    state.timer % 60;

  document.getElementById("app").innerHTML = `

  <div class="rounded-[2rem] bg-white/80 p-8 shadow-xl text-center">

    <h2 class="text-4xl font-black text-emerald-600">
      🎉 Selamat
    </h2>

    <p class="mt-4 text-xl font-bold text-slate-800">
      ${state.nama}
    </p>

    <p class="mt-2 text-slate-700">
      Kelas ${state.kelas}
    </p>

    <div class="mt-6 rounded-3xl bg-gradient-to-r from-green-400 to-emerald-500 p-6 text-white shadow-xl">

      <div class="text-lg">
        Total Skor
      </div>

      <div class="text-6xl font-black">
        ${state.score}
      </div>

    </div>

    <div class="mt-5 text-lg font-bold text-slate-700">
      ⏱️ Waktu:
      ${minutes}:${seconds
        .toString()
        .padStart(2, "0")}
    </div>

    <button
      onclick="sendScore()"
      class="mt-6 rounded-2xl bg-blue-500 px-6 py-3 font-bold text-white shadow-lg">

      Kirim Nilai

    </button>

  </div>
  `;
}

async function sendScore() {

  try {

    await fetch(
      GOOGLE_SCRIPT_URL,
      {
        method: "POST",

        body: JSON.stringify({

          nama: state.nama,

          kelas: state.kelas,

          skor: state.score,

          waktu: state.timer
        })
      }
    );

    popup(
      "Nilai berhasil dikirim"
    );

  } catch {

    popup(
      "Gagal mengirim nilai",
      "error"
    );
  }
}

showMenu();

</script>

</body>
</html>
