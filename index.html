<script>
  let screen = "menu";
  let level = 1;
  let modeQuestion = null;
  let quartileData = [];
  let draggedIndex = null;

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function sortNumbers(arr) {
    return [...arr].sort((a, b) => a - b);
  }

  function generateModeQ() {
    const start = rand(10, 50);
    const width = 5;
    const data = Array.from({ length: 5 }, (_, i) => ({
      lower: start + i * width,
      upper: start + i * width + 4,
      freq: rand(3, 12)
    }));

    const modalIndex = rand(1, 3);
    const otherMax = Math.max(...data.filter((_, i) => i !== modalIndex).map(x => x.freq));
    data[modalIndex].freq = otherMax + rand(2, 4);

    return { data, modalIndex };
  }

  function generateQuartileQ() {
    const values = new Set();
    while (values.size < 10) values.add(rand(10, 100));
    return Array.from(values);
  }

  /* =======================
     🔥 INI YANG KETINGGALAN
     ======================= */
  function generateFinalAssessment() {
    return {
      modeQuestion: generateModeQ(),
      quartileQuestion: generateQuartileQ()
    };
  }

  function getModeDetails(q) {
    const modalClass = q.data[q.modalIndex];
    const lowerBoundary = modalClass.lower - 0.5;
    const classWidth = 5;
    const freqBefore = q.data[q.modalIndex - 1]?.freq ?? modalClass.freq - 1;
    const freqAfter = q.data[q.modalIndex + 1]?.freq ?? modalClass.freq - 1;
    const leftDifference = Math.max(1, modalClass.freq - freqBefore);
    const rightDifference = Math.max(1, modalClass.freq - freqAfter);
    const modeValue = lowerBoundary + (leftDifference / (leftDifference + rightDifference)) * classWidth;

    return { modalClass, lowerBoundary, classWidth, freqBefore, freqAfter, leftDifference, rightDifference, modeValue };
  }

  function getQuartileDetails(data) {
    const sorted = sortNumbers(data);
    const q2 = (sorted[4] + sorted[5]) / 2;
    const q1 = sorted.slice(0, 5)[2];
    const q3 = sorted.slice(5)[2];
    return { sorted, q1, q2, q3 };
  }

  function playTone(type = "success") {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === "success") {
        osc.frequency.setValueAtTime(523.25, ctx.currentTime);
        osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.12);
      } else {
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(220, ctx.currentTime);
        osc.frequency.setValueAtTime(170, ctx.currentTime + 0.14);
      }

      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } catch {}
  }

  function popup(text, type = "success") {
    const div = document.createElement("div");
    div.className = `fixed top-8 left-1/2 -translate-x-1/2 z-50 rounded-2xl px-6 py-4 text-white font-bold shadow-2xl ${
      type === "success" ? "bg-green-500" : "bg-red-500"
    }`;
    div.textContent = text;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 1000);
  }

  function showMenu() {
    document.getElementById("app").innerHTML = `
      <h1 class="text-3xl font-bold">Menu</h1>
      <button onclick="showQuiz()" class="mt-4 bg-orange-400 px-4 py-2 text-white rounded">Tantangan</button>
    `;
  }

  function showQuiz() {
    const assessment = generateFinalAssessment();
    const modeD = getModeDetails(assessment.modeQuestion);
    const quartileD = getQuartileDetails(assessment.quartileQuestion);

    window.quizAnswer = {
      mode: Number(modeD.modeValue.toFixed(1)),
      q1: quartileD.q1,
      q2: quartileD.q2,
      q3: quartileD.q3
    };

    document.getElementById("app").innerHTML = `
      <h2 class="text-xl font-bold">Tantangan</h2>

      <input id="modeAnswer" placeholder="Modus" class="border p-2 block mt-3">
      <input id="q1Answer" placeholder="Q1" class="border p-2 block mt-2">
      <input id="q2Answer" placeholder="Q2" class="border p-2 block mt-2">
      <input id="q3Answer" placeholder="Q3" class="border p-2 block mt-2">

      <button onclick="checkQuiz()" class="mt-3 bg-green-500 px-4 py-2 text-white rounded">Cek</button>
      <div id="quizResult"></div>

      <button onclick="showMenu()" class="mt-3 bg-gray-500 px-4 py-2 text-white rounded">Kembali</button>
    `;
  }

  function checkQuiz() {
    const mode = Number(document.getElementById("modeAnswer").value);
    const q1 = Number(document.getElementById("q1Answer").value);
    const q2 = Number(document.getElementById("q2Answer").value);
    const q3 = Number(document.getElementById("q3Answer").value);

    const ok =
      Math.abs(mode - window.quizAnswer.mode) < 0.2 &&
      q1 === window.quizAnswer.q1 &&
      q2 === window.quizAnswer.q2 &&
      q3 === window.quizAnswer.q3;

    const result = document.getElementById("quizResult");

    if (ok) {
      result.innerHTML = `<p class="text-green-600 font-bold">Benar!</p>`;
    } else {
      result.innerHTML = `<p class="text-red-600 font-bold">Masih salah</p>`;
    }
  }

  showMenu();
</script>
